server {
    listen 80;
    server_name localhost admincf.cistcorfact.test admincf.localhost *.admincf.localhost;
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location / {
        root /var/www/frontend;
        try_files $uri /index.html;
    }

    # Reescritura para auth/login
    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /api/$1 break;
        proxy_pass http://cistcorfact_nginx:80;
        proxy_set_header Host admincf.localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy general para API
    location /api/ {
        proxy_pass http://cistcorfact_nginx:80/api/;
        proxy_set_header Host admincf.localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}