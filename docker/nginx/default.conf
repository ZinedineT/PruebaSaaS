server {
    listen 80;
    server_name localhost;
    
    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Servir React en la raíz
    location / {
        root /var/www/frontend;
        try_files $uri /index.html;
    }

    # Servir API de Laravel
    location /api {
        alias /var/www/backend/public;
        try_files $uri @laravel;
        
        location ~ \.php$ {
            fastcgi_pass php:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
            include fastcgi_params;
        }
    }
    
    location @laravel {
        rewrite /api/(.*)$ /index.php?/$1 last;
    }

    # Archivos estáticos de Laravel
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public$fastcgi_script_name;
        include fastcgi_params;
    }
}