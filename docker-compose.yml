services:
  mysql:
    image: mysql:8.0
    container_name: proyecto_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: facturacion_db      # Nombre de tu BD
      MYSQL_ROOT_PASSWORD: root123        # Contraseña del root (cámbiala si quieres)
      MYSQL_USER: laravel_user            # Usuario que usará Laravel
      MYSQL_PASSWORD: laravel_password    # Contraseña para Laravel
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    command: --default-authentication-plugin=mysql_native_password

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: proyecto_php
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./frontend:/var/www/frontend
    environment:
      - PHP_IDE_CONFIG=serverName=localhost
    depends_on:
      - mysql
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: proyecto_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/backend
      - ./frontend/build:/var/www/frontend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data: